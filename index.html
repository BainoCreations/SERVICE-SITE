<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Church Welcome</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== SCREEN 1 ===== -->
    <div id="screen1">
        <header class="header">
            <img src="images/logo.png" alt="Church Logo" class="logo" />
        </header>

        <main class="main-content">
            <div class="welcome-wrapper">
                <div class="burst-particles">
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                    <div class="burst-particle"></div>
                </div>
                <div class="burst-ring"></div>
                <div class="burst-ring"></div>
                <h1 class="welcome-text">Welcome To Church</h1>
            </div>
        </main>

        <footer class="footer">
            <img src="images/footer-bg.png" alt="Footer" />
        </footer>
    </div>

        <!-- ===== SCREEN 2 ===== -->
    <div id="screen2">
        <header class="header">
            <img src="images/logo.png" alt="Church Logo" class="logo" />
        </header>

        <main class="main-content">
            <div class="screen2-wrapper">
                <h1 class="screen2-text">
                    <span class="dark-text">Kingdom</span>
                    <span class="gold-text">Realities</span>
                    <span class="dark-text">World</span>
                </h1>

                <div class="card">
                    <h2 class="card-title">Follow Us</h2>

                    <div class="social-links">
                        <a href="https://www.facebook.com/kingdomreality...." target="_blank" class="social-link facebook">
                            <span class="icon-circle"><i class="fab fa-facebook-f"></i></span>
                            <span class="link-text">Kingdom Reality Ministries</span>
                        </a>
                        <a href="https://www.youtube.com/@kingdomrealityministriestv" target="_blank" class="social-link youtube">
                            <span class="icon-circle"><i class="fab fa-youtube"></i></span>
                            <span class="link-text">Kingdom Reality Ministries Tv</span>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <img src="images/footer-bg.png" alt="Footer" />
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
